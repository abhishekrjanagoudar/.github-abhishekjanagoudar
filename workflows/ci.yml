name: CI Hooks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'
      
      - run: npm ci
      
      - name: Type Check
        run: npx tsc --noEmit
        
      - name: Lint
        run: npm run lint
        
      - name: Test
        run: npm test -- --silent
